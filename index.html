<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="給与帳">
<link rel="apple-touch-icon" href="icon.png">
<title>給与帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #111318;
  --paper: #f4f1ec;
  --card: #ffffff;
  --accent: #1d4ed8;
  --accent2: #0ea5e9;
  --muted: #6b7280;
  --border: #e2ddd6;
  --gross: #1d4ed8;
  --net: #059669;
  --bonus-gross: #b45309;
  --bonus-net: #d97706;
  --danger: #dc2626;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.hdr {
  background: var(--ink); color: #fff;
  padding: calc(var(--safe-top) + 10px) 18px 14px;
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-shrink: 0;
}
.hdr-left h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
.hdr-left .sub { font-size: 10px; opacity: 0.4; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
.hdr-right { display: flex; gap: 8px; }
.hdr-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.12); color: white;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
}

/* ── Tab bar ── */
.tab-bar { display: flex; background: var(--ink); border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.tab-btn {
  flex: 1; padding: 9px 2px 11px; border: none; background: none;
  color: rgba(255,255,255,0.35); font-size: 9px; font-family: inherit;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: color 0.2s;
}
.tab-btn.active { color: white; }
.tab-btn svg { width: 20px; height: 20px; }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page { display: none; }
.page.active { display: block; }

/* ── Back button row ── */
.back-row {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px 8px;
}
.back-btn {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none; color: var(--accent);
  font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
  padding: 4px 0;
}
.back-btn svg { width: 18px; height: 18px; }
.back-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-left: auto; padding-right: 2px; }

/* ── Cards ── */
.card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin: 0 16px 12px; }
.card-hdr { padding: 13px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-hdr h2 { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.card-body { padding: 14px 16px; }

/* ── Year list ── */
.year-section { padding: 16px 16px 0; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

.year-card {
  background: var(--card); border-radius: 18px; border: 1px solid var(--border);
  margin-bottom: 12px; overflow: hidden; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-user-select: none;
}
.year-card:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.year-card-top {
  padding: 16px 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.year-num { font-size: 32px; font-weight: 900; font-family: 'DM Mono', monospace; line-height: 1; letter-spacing: -1px; }
.year-badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  background: #e8f0fe; color: var(--accent); letter-spacing: 0.5px;
}
.year-badge.current { background: var(--ink); color: white; }
.year-kpis { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--border); }
.year-kpi { padding: 10px 14px; border-right: 1px solid var(--border); }
.year-kpi:last-child { border-right: none; }
.year-kpi .kl { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
.year-kpi .kv { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; margin-top: 2px; }
.year-kpi .kv.g { color: var(--gross); }
.year-kpi .kv.n { color: var(--net); }
.year-kpi .kv.b { color: var(--bonus-gross); }
.year-arrow { color: var(--muted); font-size: 18px; align-self: center; }

.add-year-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 32px); margin: 0 16px 16px;
  padding: 14px; border: 2px dashed var(--border);
  border-radius: 16px; background: none; color: var(--muted);
  font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.add-year-btn:active { border-color: var(--accent); color: var(--accent); }

/* ── Month list ── */
.month-grid { padding: 8px 16px 16px; }
.month-row {
  background: var(--card); border-radius: 14px; border: 1px solid var(--border);
  margin-bottom: 8px; padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: transform 0.12s;
}
.month-row:active { transform: scale(0.98); }
.month-num { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700; width: 36px; flex-shrink: 0; line-height: 1; }
.month-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
.month-data { flex: 1; min-width: 0; }
.month-row-amounts { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 8px; }
.amt-item .al { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.3px; }
.amt-item .av { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.amt-item .av.g { color: var(--gross); }
.amt-item .av.n { color: var(--net); }
.amt-item .av.bg { color: var(--bonus-gross); }
.amt-item .av.bn { color: var(--bonus-net); }
.amt-item .av.empty { color: var(--border); }
.month-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }
.month-empty { text-align: center; padding: 6px 0 4px; color: var(--muted); font-size: 12px; }

.month-row.no-data { opacity: 0.5; }

/* Year total bar */
.year-total-bar {
  background: var(--ink); color: white;
  margin: 0 16px 12px; border-radius: 14px;
  padding: 14px 16px;
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
}
.ytb-item .yl { font-size: 9px; opacity: 0.5; letter-spacing: 0.5px; text-transform: uppercase; }
.ytb-item .yv { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; margin-top: 2px; }
.ytb-item .yv.g { color: #93c5fd; }
.ytb-item .yv.n { color: #6ee7b7; }
.ytb-item .yv.b { color: #fcd34d; }

/* ── Input page ── */
.input-page { padding: 8px 16px calc(var(--safe-bot) + 16px); }
.month-label-big {
  text-align: center; padding: 8px 0 16px;
}
.month-label-big .ml-m { font-size: 48px; font-weight: 900; font-family: 'DM Mono', monospace; line-height: 1; }
.month-label-big .ml-y { font-size: 14px; color: var(--muted); margin-top: 2px; }

.inp-section { margin-bottom: 12px; }
.inp-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--muted); padding: 0 4px 6px;
}
.inp-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
.inp-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.inp-row:last-child { border-bottom: none; }
.inp-lbl { font-size: 13px; font-weight: 500; flex: 1; }
.inp-lbl .sublbl { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
.inp-wrap { position: relative; width: 160px; flex-shrink: 0; }
.inp-yen { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-family: 'DM Mono', monospace; font-size: 14px; color: var(--muted); pointer-events: none; }
.inp-field {
  width: 160px; padding: 9px 10px 9px 24px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 16px; font-family: 'DM Mono', monospace; font-weight: 500;
  background: var(--paper); color: var(--ink); text-align: right;
  -webkit-appearance: none; appearance: none; transition: border-color 0.2s;
}
.inp-field:focus { outline: none; border-color: var(--accent); background: white; }
.inp-memo { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: inherit; background: var(--paper); color: var(--ink); -webkit-appearance: none; transition: border-color 0.2s; }
.inp-memo:focus { outline: none; border-color: var(--accent); background: white; }

.calc-bar {
  background: var(--ink); color: white; border-radius: 12px; padding: 12px 16px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px;
}
.cb-item .cl { font-size: 9px; opacity: 0.5; letter-spacing: 0.5px; }
.cb-item .cv { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; margin-top: 1px; }
.cb-item .cv.g { color: #93c5fd; }
.cb-item .cv.n { color: #6ee7b7; }
.cb-item .cv.b { color: #fcd34d; }

.btn-save {
  width: 100%; padding: 15px; border: none; border-radius: 13px;
  background: var(--accent); color: white; font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer; letter-spacing: 0.3px;
  transition: transform 0.1s, opacity 0.15s;
}
.btn-save:active { transform: scale(0.98); opacity: 0.85; }
.btn-save:disabled { opacity: 0.45; }
.btn-delete {
  width: 100%; padding: 12px; border: 1.5px solid var(--danger); border-radius: 13px;
  background: none; color: var(--danger); font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; margin-top: 8px;
}

/* ── Graph page ── */
.graph-page { padding: 14px 16px calc(var(--safe-bot) + 16px); }
.graph-year-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.yr-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
.yr-btn:disabled { opacity: 0.25; cursor: default; }
.yr-lbl { font-size: 20px; font-weight: 900; font-family: 'DM Mono', monospace; }

.sub-tabs { display: flex; background: var(--paper); border-radius: 10px; padding: 3px; gap: 2px; margin-bottom: 12px; }
.sub-tab { flex: 1; padding: 7px; border: none; border-radius: 7px; font-size: 12px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
.sub-tab.active { background: var(--card); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px; }
.kpi-card .kl { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); }
.kpi-card .kv { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; margin-top: 3px; line-height: 1.1; }
.kpi-card .ks { font-size: 11px; color: var(--muted); margin-top: 3px; }
.kpi-card.kg { border-left: 3px solid var(--gross); }
.kpi-card.kn { border-left: 3px solid var(--net); }
.kpi-card.kb { border-left: 3px solid var(--bonus-gross); }
.kpi-card.ka { border-left: 3px solid #8b5cf6; }

.chart-legend { display: flex; gap: 14px; justify-content: center; padding: 8px 0 6px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.chart-wrap { position: relative; }
.chart-tip { position: absolute; background: var(--ink); color: white; border-radius: 10px; padding: 8px 12px; font-size: 11px; line-height: 1.6; pointer-events: none; opacity: 0; transition: opacity 0.15s; white-space: nowrap; z-index: 10; }
.chart-tip.vis { opacity: 1; }

.cmp-row { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.cmp-row:last-child { border-bottom: none; }
.cmp-yr { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; width: 44px; flex-shrink: 0; }
.cmp-bars { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.bar-row { display: flex; align-items: center; gap: 6px; }
.bar-bg { flex: 1; height: 7px; background: var(--paper); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); min-width: 2px; }
.bar-amt { font-family: 'DM Mono', monospace; font-size: 11px; width: 64px; text-align: right; flex-shrink: 0; }
.cmp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.delta { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.delta.up   { background: #dcfce7; color: #166534; }
.delta.down { background: #fee2e2; color: #9f1239; }
.delta.flat { background: var(--paper); color: var(--muted); }
.cmp-mo { font-size: 10px; color: var(--muted); }

/* ── Config page ── */
.config-page { padding: 14px 0 calc(var(--safe-bot) + 16px); }
.cfg-row { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: default; transition: background 0.15s; }
.cfg-row.dragging { opacity: 0.4; background: var(--paper); }
.cfg-row.drag-over { background: #e8f0fe; border-top: 2px solid var(--accent); }
.drag-handle { color: var(--muted); cursor: grab; font-size: 18px; padding: 0 4px; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
.drag-handle:active { cursor: grabbing; }
.cfg-row:last-child { border-bottom: none; }
.cat-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.cat-income { background: #f0fdf4; color: #166534; }
.cat-deduction { background: #fff1f2; color: #9f1239; }
.btn-primary { width: calc(100% - 32px); margin: 0 16px; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: white; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-secondary { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 9px; background: none; color: var(--ink); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; }
.btn-danger2 { padding: 5px 10px; border: 1.5px solid var(--danger); border-radius: 8px; background: none; color: var(--danger); font-size: 12px; font-family: inherit; cursor: pointer; font-weight: 500; }
.field-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: inherit; background: var(--paper); color: var(--ink); -webkit-appearance: none; }
.field-input:focus { outline: none; border-color: var(--accent); background: white; }
.field-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 5px; }
.field-group { margin-bottom: 12px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet { width: 100%; background: var(--card); border-radius: 20px 20px 0 0; padding: 20px; padding-bottom: calc(var(--safe-bot) + 20px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }

/* ── Confirm overlay ── */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 300; }
.confirm-sheet { width: 100%; background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px calc(var(--safe-bot) + 24px); }

/* ── Toast ── */
#toast { position: fixed; bottom: calc(var(--safe-bot) + 70px); left: 50%; transform: translateX(-50%) translateY(16px); background: var(--ink); color: white; padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 400; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Spinner / Empty ── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px 24px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* ── URL banner ── */
.url-banner { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 12px; padding: 12px 14px; margin: 0 16px 12px; font-size: 13px; display: flex; gap: 8px; }
.url-banner a { color: var(--accent); font-weight: 600; }

select.field-input { background-image: none; }

/* ── 詳細入力パネル ── */
.detail-toggle {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 12px; margin-bottom: 12px;
  border: 1.5px dashed var(--border); border-radius: 12px;
  background: none; color: var(--muted); font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.detail-toggle.open { border-color: var(--accent); color: var(--accent); background: #eef2ff; }
.detail-toggle .arrow { transition: transform 0.25s; }
.detail-toggle.open .arrow { transform: rotate(180deg); }

.detail-panel {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
  opacity: 0;
}
.detail-panel.open { max-height: 2000px; opacity: 1; }

.detail-section-lbl {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 8px 4px 5px; display: flex; align-items: center; gap: 6px;
}
.detail-section-lbl.inc { color: #166534; }
.detail-section-lbl.ded { color: #9f1239; }
.detail-section-lbl::after { content:''; flex:1; height:1px; background:currentColor; opacity:0.2; }

.detail-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.detail-row-lbl { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-calc-bar {
  background: #1e293b; color: white; border-radius: 11px; padding: 11px 14px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 12px;
}
.dcb-item .dl { font-size: 9px; opacity: 0.5; letter-spacing: 0.4px; }
.dcb-item .dv { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; margin-top: 1px; }
.dcb-item .dv.g { color: #93c5fd; }
.dcb-item .dv.n { color: #6ee7b7; }
</style>
</head>
<body>

<script>
// ── GAS URL ───────────────────────────────────────────────
const GAS_INIT = 'YOUR_GAS_WEB_APP_URL_HERE';
let GAS_URL = GAS_INIT;

// ── State ─────────────────────────────────────────────────
let S = {
  tab: 'years',           // 'years' | 'graph' | 'config'
  viewYear: null,         // 年次一覧で選択中の年
  editKey: null,          // 編集中の {year, month}
  allData: [],            // [{year,month,salaryGross,salaryNet,bonusGross,bonusNet,memo,id}]
  loaded: false,
  graphYear: new Date().getFullYear(),
  graphTab: 'monthly',
  config: { fields: [] }, detailFields: {}, detailOpen: false,
};

// ── API (全GETで統一) ──────────────────────────────────────
async function api(params) {
  if (GAS_URL === GAS_INIT) return demoApi(params);
  const p = {};
  for (const k in params) {
    p[k] = typeof params[k] === 'object' ? JSON.stringify(params[k]) : params[k];
  }
  const res = await fetch(GAS_URL + '?' + new URLSearchParams(p));
  return res.json();
}

// ── デモデータ ─────────────────────────────────────────────

    else demoData.push({id:Date.now().toString(),...d});

    const y=+p.year; demoData=demoData.filter(x=>x.year!==y);

}

<script>
// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('gas_url');
  if (saved && saved !== GAS_INIT) GAS_URL = saved;
  await loadAll();
  renderYears();
});

async function loadAll() {
  try {
    const [r, cfg] = await Promise.all([
      api({action:'load'}),
      api({action:'getConfig'}),
    ]);
    S.allData  = r.data   || [];
    S.config   = cfg      || { fields: [] };
  } catch(e) { S.allData = []; }
  S.loaded = true;
}

// ── Tab switching ──────────────────────────────────────────
function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'years') renderYears();
  else if (tab === 'graph') { S.graphYear = getYears().includes(S.graphYear) ? S.graphYear : (getYears().slice(-1)[0]||new Date().getFullYear()); renderGraph(); }
  else if (tab === 'config') renderConfig();
}

// ════════════════════════════════════════
//  年次一覧
// ════════════════════════════════════════
function getYears() {
  return [...new Set(S.allData.map(d=>d.year))].sort((a,b)=>b-a);
}
function yearSummary(year) {
  const rows = S.allData.filter(d=>d.year===year);
  const salaryGross = rows.reduce((a,d)=>a+(+d.salaryGross||0),0);
  const salaryNet   = rows.reduce((a,d)=>a+(+d.salaryNet||0),0);
  const bonusGross  = rows.reduce((a,d)=>a+(+d.bonusGross||0),0);
  const bonusNet    = rows.reduce((a,d)=>a+(+d.bonusNet||0),0);
  const totalGross  = salaryGross + bonusGross;
  const totalNet    = salaryNet + bonusNet;
  return { salaryGross, salaryNet, bonusGross, bonusNet, totalGross, totalNet, months: rows.length };
}

function renderYears() {
  S.viewYear = null;
  S.editKey = null;
  updateHdr('給与帳', [
    `<button class="hdr-btn" onclick="showAddYear()" title="年を追加">＋</button>`
  ]);
  const years = getYears();
  const curYear = new Date().getFullYear();
  let html = '<div class="year-section">';
  if (!years.length) {
    html += `<div class="empty-state" style="padding:60px 24px">
      <div class="empty-icon">📅</div>
      <p>＋ボタンで年を追加してください</p>
    </div>`;
  } else {
    html += `<div class="section-label">年次一覧</div>`;
    html += years.map(y => {
      const sm = yearSummary(y);
      const isCur = y === curYear;
      return `<div class="year-card" onclick="openYear(${y})">
        <div class="year-card-top">
          <div>
            <div class="year-num">${y}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">${sm.months}ヶ月分</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <span class="year-badge${isCur?' current':''}">${isCur?'今年':y+'年'}</span>
            <button onclick="event.stopPropagation();confirmDeleteYear(${y})" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:2px 0">🗑 削除</button>
          </div>
        </div>
        <div class="year-kpis">
          <div class="year-kpi"><div class="kl">年収(額面)</div><div class="kv g">¥${fmtM(sm.totalGross)}</div></div>
          <div class="year-kpi"><div class="kl">年収(手取)</div><div class="kv n">¥${fmtM(sm.totalNet)}</div></div>
          <div class="year-kpi"><div class="kl">賞与合計</div><div class="kv b">¥${fmtM(sm.bonusGross)}</div></div>
        </div>
      </div>`;
    }).join('');
  }
  html += `</div>`;
  // URLバナー
  if (GAS_URL === GAS_INIT) {
    html = `<div class="url-banner" style="margin-top:16px">⚠️ <span>デモモード中。<a href="#" onclick="switchTab('config')">設定</a>でGAS URLを設定してください。</span></div>` + html;
  }
  setContent(html);
}

function showAddYear() {
  const html = `<div class="confirm-overlay" id="add-yr-overlay" onclick="if(event.target===this)this.remove()">
    <div class="confirm-sheet">
      <div class="modal-handle"></div>
      <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">年を追加</h3>
      <div class="field-group">
        <label class="field-label">追加する年</label>
        <select class="field-input" id="new-year-sel"></select>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn-secondary" style="flex:1" onclick="document.getElementById('add-yr-overlay').remove()">キャンセル</button>
        <button class="btn-primary" style="flex:2;margin:0;width:auto" onclick="doAddYear()">追加</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  const sel = document.getElementById('new-year-sel');
  const existing = getYears();
  const cur = new Date().getFullYear();
  for (let y = cur + 1; y >= cur - 10; y--) {
    if (!existing.includes(y)) {
      const o = new Option(y + '年', y);
      if (y === cur) o.selected = true;
      sel.add(o);
    }
  }
}
function doAddYear() {
  const y = +document.getElementById('new-year-sel').value;
  document.getElementById('add-yr-overlay').remove();
  // 年を追加してその年の月次画面へ
  openYear(y);
}

function confirmDeleteYear(year) {
  if (!confirm(`${year}年のデータをすべて削除しますか？`)) return;
  deleteYear(year);
}
async function deleteYear(year) {
  try {
    await api({action:'deleteYear', year});
    S.allData = S.allData.filter(d => d.year !== year);
    renderYears();
    toast(`🗑 ${year}年を削除しました`);
  } catch(e) { toast('❌ 削除に失敗しました'); }
}

// ════════════════════════════════════════
//  月次一覧
// ════════════════════════════════════════
function openYear(year) {
  S.viewYear = year;
  updateHdr(`${year}年`, [
    `<button class="hdr-btn" onclick="renderYears()">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>`
  ]);

  const sm = yearSummary(year);
  let html = `
    <div class="back-row">
      <button class="back-btn" onclick="renderYears()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        年次一覧
      </button>
      <span class="back-title">${year}年</span>
    </div>
    <div class="year-total-bar">
      <div class="ytb-item"><div class="yl">年収(額面)</div><div class="yv g">¥${fmtM(sm.totalGross)}</div></div>
      <div class="ytb-item"><div class="yl">年収(手取)</div><div class="yv n">¥${fmtM(sm.totalNet)}</div></div>
      <div class="ytb-item"><div class="yl">賞与合計</div><div class="yv b">¥${fmtM(sm.bonusGross)}</div></div>
    </div>
    <div class="month-grid">`;

  for (let m = 1; m <= 12; m++) {
    const rec = S.allData.find(d => d.year === year && d.month === m);
    const hasData = !!rec;
    const sg = rec ? +rec.salaryGross||0 : 0;
    const sn = rec ? +rec.salaryNet||0   : 0;
    const bg = rec ? +rec.bonusGross||0  : 0;
    const bn = rec ? +rec.bonusNet||0    : 0;
    const hasBonus = bg > 0;

    html += `<div class="month-row${hasData?'':' no-data'}" onclick="openMonth(${year},${m})">
      <div class="month-num">${String(m).padStart(2,'0')}</div>
      <div class="month-divider"></div>
      <div class="month-data">
        ${hasData ? `
        <div class="month-row-amounts">
          <div class="amt-item"><div class="al">💴 給与額面</div><div class="av g">¥${N(sg)}</div></div>
          <div class="amt-item"><div class="al">💴 給与手取</div><div class="av n">¥${N(sn)}</div></div>
          <div class="amt-item"><div class="al">🎁 賞与額面</div><div class="av${hasBonus?' bg':' empty'}">${hasBonus?'¥'+N(bg):'—'}</div></div>
          <div class="amt-item"><div class="al">🎁 賞与手取</div><div class="av${hasBonus?' bn':' empty'}">${hasBonus?'¥'+N(bn):'—'}</div></div>
        </div>
        ${rec.memo?`<div style="font-size:10px;color:var(--muted);margin-top:4px">${eh(rec.memo)}</div>`:''}
        ` : `<div class="month-empty">タップして入力</div>`}
      </div>
      <div class="month-arrow">›</div>
    </div>`;
  }
  html += `</div>`;
  setContent(html);
}

// ════════════════════════════════════════
//  入力画面
// ════════════════════════════════════════
function openMonth(year, month) {
  S.editKey = { year, month };
  S.detailFields = {};
  S.detailOpen = false;
  const rec = S.allData.find(d => d.year === year && d.month === month) || {};

  updateHdr(`${year}年${month}月`, [
    `<button class="hdr-btn" onclick="openYear(${year})">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>`
  ]);

  const v = k => rec[k] || '';

  // 詳細フィールド（設定から生成）
  const fields = S.config.fields || [];
  const incFields = fields.filter(f => f.category === 'income');
  const dedFields = fields.filter(f => f.category === 'deduction');

  const detailRow = f => {
    const stored = rec.details ? (rec.details[f.key] || '') : '';
    return `<div class="detail-row">
      <span class="detail-row-lbl">${eh(f.label)}</span>
      <div class="inp-wrap" style="width:148px;flex-shrink:0">
        <span class="inp-yen" style="font-size:13px">¥</span>
        <input type="number" inputmode="numeric" class="inp-field" style="width:148px;font-size:14px;padding:7px 8px 7px 22px"
          placeholder="0" data-key="${f.key}" value="${stored}" oninput="onDetailInput('${f.key}',this.value)" style="font-size:16px !important">
      </div>
    </div>`;
  };

  const detailPanel = fields.length === 0 ? `
    <div style="text-align:center;padding:16px 0;color:var(--muted);font-size:13px">
      設定タブで給与項目を追加してください
    </div>` : `
    ${incFields.length ? `<div class="detail-section-lbl inc">📥 支給項目</div>${incFields.map(detailRow).join('')}` : ''}
    ${dedFields.length ? `<div class="detail-section-lbl ded">📤 控除項目</div>${dedFields.map(detailRow).join('')}` : ''}
    <div class="detail-calc-bar">
      <div class="dcb-item"><div class="dl">支給合計</div><div class="dv g" id="dc-inc">¥0</div></div>
      <div class="dcb-item"><div class="dl">控除合計</div><div class="dv" style="color:#fca5a5" id="dc-ded">¥0</div></div>
      <div class="dcb-item"><div class="dl">→ 推計 額面</div><div class="dv g" id="dc-gross">¥0</div></div>
      <div class="dcb-item"><div class="dl">→ 推計 手取り</div><div class="dv n" id="dc-net">¥0</div></div>
    </div>`;

  const html = `
    <div class="input-page">
      <div class="back-row" style="padding-top:6px">
        <button class="back-btn" onclick="openYear(${year})">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          ${year}年
        </button>
        <span class="back-title">${month}月</span>
      </div>

      <div class="month-label-big">
        <div class="ml-m">${String(month).padStart(2,'0')}</div>
        <div class="ml-y">${year}年</div>
      </div>

      <!-- 給与 -->
      <div class="inp-section">
        <div class="inp-section-title">💴 給与</div>
        <div class="inp-card">
          <div class="inp-row">
            <div class="inp-lbl">支給額<span class="sublbl">額面・税引前</span></div>
            <div class="inp-wrap">
              <span class="inp-yen">¥</span>
              <input type="number" inputmode="numeric" class="inp-field" id="f-sg" value="${v('salaryGross')}" placeholder="0" oninput="updateCalc()">
            </div>
          </div>
          <div class="inp-row">
            <div class="inp-lbl">手取り<span class="sublbl">税引後・振込額</span></div>
            <div class="inp-wrap">
              <span class="inp-yen">¥</span>
              <input type="number" inputmode="numeric" class="inp-field" id="f-sn" value="${v('salaryNet')}" placeholder="0" oninput="updateCalc()">
            </div>
          </div>
        </div>
      </div>

      <!-- 詳細入力トグル -->
      <button class="detail-toggle" id="detail-toggle-btn" onclick="toggleDetail()">
        <span>📋 詳細を入力する（基本給・手当・控除）</span>
        <span class="arrow">▼</span>
      </button>
      <div class="detail-panel" id="detail-panel">
        ${detailPanel}
      </div>

      <!-- 賞与 -->
      <div class="inp-section">
        <div class="inp-section-title">🎁 賞与（ない月は空欄でOK）</div>
        <div class="inp-card">
          <div class="inp-row">
            <div class="inp-lbl">賞与支給額<span class="sublbl">額面・税引前</span></div>
            <div class="inp-wrap">
              <span class="inp-yen">¥</span>
              <input type="number" inputmode="numeric" class="inp-field" id="f-bg" value="${v('bonusGross')}" placeholder="0" oninput="updateCalc()">
            </div>
          </div>
          <div class="inp-row">
            <div class="inp-lbl">賞与手取り<span class="sublbl">税引後・振込額</span></div>
            <div class="inp-wrap">
              <span class="inp-yen">¥</span>
              <input type="number" inputmode="numeric" class="inp-field" id="f-bn" value="${v('bonusNet')}" placeholder="0" oninput="updateCalc()">
            </div>
          </div>
        </div>
      </div>

      <!-- メモ -->
      <div class="inp-section">
        <div class="inp-section-title">メモ</div>
        <div class="inp-card">
          <div class="inp-row">
            <input type="text" class="inp-memo" id="f-memo" value="${eh(v('memo'))}" placeholder="例: 昇給・残業多め など" maxlength="50">
          </div>
        </div>
      </div>

      <!-- 計算バー -->
      <div class="calc-bar" id="calc-bar">
        <div class="cb-item"><div class="cl">給与(額面)</div><div class="cv g" id="cb-sg">¥0</div></div>
        <div class="cb-item"><div class="cl">給与(手取)</div><div class="cv n" id="cb-sn">¥0</div></div>
        <div class="cb-item"><div class="cl">賞与(額面)</div><div class="cv b" id="cb-bg">—</div></div>
        <div class="cb-item"><div class="cl">月合計(手取)</div><div class="cv n" id="cb-total">¥0</div></div>
      </div>

      <button class="btn-save" onclick="saveMonth()" id="save-btn">保存する</button>
      ${rec.id ? `<button class="btn-delete" onclick="deleteMonth()">このデータを削除</button>` : ''}
    </div>`;

  setContent(html);
  // 保存済み詳細データを復元
  if (rec.details) {
    S.detailFields = {...rec.details};
    // 詳細が入力済みなら自動で開く
    if (Object.values(rec.details).some(v => +v > 0)) {
      setTimeout(() => toggleDetail(), 50);
    }
  }
  updateCalc();
}

function toggleDetail() {
  S.detailOpen = !S.detailOpen;
  const btn = document.getElementById('detail-toggle-btn');
  const panel = document.getElementById('detail-panel');
  if (!btn || !panel) return;
  btn.classList.toggle('open', S.detailOpen);
  panel.classList.toggle('open', S.detailOpen);
  btn.querySelector('span:last-child').textContent = S.detailOpen ? '▲ 詳細を閉じる' : '▼ 詳細を入力する（基本給・手当・控除）';
}

function onDetailInput(key, val) {
  S.detailFields[key] = val;
  // 詳細から支給合計・控除合計を自動計算してメイン欄に反映
  const fields = S.config.fields || [];
  let inc = 0, ded = 0;
  fields.forEach(f => {
    const v = parseInt(S.detailFields[f.key]) || 0;
    if (f.category === 'income') inc += v;
    else ded += v;
  });
  // 詳細計算バーを更新
  const el = id => document.getElementById(id);
  if (el('dc-inc'))   el('dc-inc').textContent   = '¥' + N(inc);
  if (el('dc-ded'))   el('dc-ded').textContent   = '¥' + N(ded);
  if (el('dc-gross')) el('dc-gross').textContent = '¥' + N(inc);
  if (el('dc-net'))   el('dc-net').textContent   = '¥' + N(inc - ded);
  // メイン欄に自動反映
  const sgEl = document.getElementById('f-sg');
  const snEl = document.getElementById('f-sn');
  if (sgEl && !sgEl.dataset.manual) sgEl.value = inc || '';
  if (snEl && !snEl.dataset.manual) snEl.value = (inc - ded) || '';
  updateCalc();
}

function updateCalc() {
  const sg = parseInt(document.getElementById('f-sg').value)||0;
  const sn = parseInt(document.getElementById('f-sn').value)||0;
  const bg = parseInt(document.getElementById('f-bg').value)||0;
  const bn = parseInt(document.getElementById('f-bn').value)||0;
  document.getElementById('cb-sg').textContent = '¥'+N(sg);
  document.getElementById('cb-sn').textContent = '¥'+N(sn);
  document.getElementById('cb-bg').textContent = bg ? '¥'+N(bg) : '—';
  document.getElementById('cb-total').textContent = '¥'+N(sn+bn);
}

async function saveMonth() {
  const {year, month} = S.editKey;
  const sg = parseInt(document.getElementById('f-sg').value)||0;
  const sn = parseInt(document.getElementById('f-sn').value)||0;
  const bg = parseInt(document.getElementById('f-bg').value)||0;
  const bn = parseInt(document.getElementById('f-bn').value)||0;
  const memo = document.getElementById('f-memo').value.trim();

  if (!sg && !sn && !bg && !bn) { toast('❌ 金額を入力してください'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中...';

  const record = { year, month, salaryGross:sg, salaryNet:sn, bonusGross:bg, bonusNet:bn, memo, details: S.detailFields };

  try {
    await api({ action:'save', record });
    // ローカルにも反映
    const idx = S.allData.findIndex(d => d.year===year && d.month===month);
    if (idx >= 0) S.allData[idx] = {...S.allData[idx], ...record};
    else S.allData.push({ id: Date.now().toString(), ...record });

    // 確認モーダル
    showConfirm({year, month, sg, sn, bg, bn, memo});
  } catch(e) {
    toast('❌ 保存に失敗しました');
    btn.disabled = false; btn.textContent = '保存する';
  }
}

async function deleteMonth() {
  const {year, month} = S.editKey;
  if (!confirm(`${year}年${month}月のデータを削除しますか？`)) return;
  try {
    const rec = S.allData.find(d => d.year===year && d.month===month);
    if (rec) {
      await api({ action:'save', record: {year, month, salaryGross:0, salaryNet:0, bonusGross:0, bonusNet:0, memo:''} });
      S.allData = S.allData.filter(d => !(d.year===year && d.month===month));
    }
    toast('🗑 削除しました');
    openYear(year);
  } catch(e) { toast('❌ 削除に失敗しました'); }
}

function refreshGraph() {
  const yrs = getYears();
  document.getElementById('g-yr-lbl').textContent = S.graphYear + '年';
  document.getElementById('g-prev').disabled = yrs.indexOf(S.graphYear) >= yrs.length-1;
  document.getElementById('g-next').disabled = yrs.indexOf(S.graphYear) <= 0;
  const yd = S.allData.filter(d => d.year === S.graphYear);
  renderKPI(yd, S.graphYear);
  if (S.graphTab === 'monthly') renderMonthlyChart(yd, S.graphYear);
  else { renderCmp(); renderYearlyLine(); }
}
function shiftGY(d) {
  const yrs = getYears(), i = yrs.indexOf(S.graphYear);
  const ni = i - d; if(ni<0||ni>=yrs.length) return;
  S.graphYear = yrs[ni]; refreshGraph();
}
function setGTab(t) {
  S.graphTab = t;
  ['monthly','compare'].forEach(k => {
    document.getElementById('st-'+k).classList.toggle('active', k===t);
    document.getElementById('g-'+k).style.display = k===t?'block':'none';
  });
  const yd = S.allData.filter(d => d.year===S.graphYear);
  if (t==='monthly') renderMonthlyChart(yd, S.graphYear);
  else { renderCmp(); renderYearlyLine(); }
}

function renderKPI(yd, yr) {
  const sg = yd.reduce((a,d)=>a+(+d.salaryGross||0),0);
  const sn = yd.reduce((a,d)=>a+(+d.salaryNet||0),0);
  const bg = yd.reduce((a,d)=>a+(+d.bonusGross||0),0);
  const bn = yd.reduce((a,d)=>a+(+d.bonusNet||0),0);
  const tg = sg+bg, tn = sn+bn;
  const prev = S.allData.filter(d=>d.year===yr-1).reduce((a,d)=>a+(+d.salaryGross||0)+(+d.bonusGross||0),0);
  const delta = prev ? ((tg-prev)/prev*100).toFixed(1) : null;
  const dStr = delta===null?'—':(+delta>=0?`▲${delta}%`:`▼${Math.abs(delta)}%`);
  const dc = delta===null?'var(--muted)':(+delta>=0?'var(--net)':'var(--danger)');
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card kg"><div class="kl">年収(額面)</div><div class="kv">¥${fmtM(tg)}</div><div class="ks" style="color:${dc}">${dStr} 前年比</div></div>
    <div class="kpi-card kn"><div class="kl">年収(手取り)</div><div class="kv">¥${fmtM(tn)}</div><div class="ks">控除率 ${tg?((tg-tn)/tg*100).toFixed(1):0}%</div></div>
    <div class="kpi-card ka"><div class="kl">給与月平均</div><div class="kv">¥${fmtM(yd.length?Math.round(sg/yd.length):0)}</div><div class="ks">${yd.length}ヶ月</div></div>
    <div class="kpi-card kb"><div class="kl">賞与合計</div><div class="kv">¥${fmtM(bg)}</div><div class="ks">${yd.filter(d=>+d.bonusGross>0).length}回分</div></div>`;
}

function renderMonthlyChart(yd, yr) {
  const cvs = document.getElementById('c-monthly');
  const dpr = window.devicePixelRatio||1, W = cvs.parentElement.clientWidth||300, H = 200;
  cvs.width=W*dpr; cvs.height=H*dpr; cvs.style.width=W+'px'; cvs.style.height=H+'px';
  const ctx = cvs.getContext('2d'); ctx.scale(dpr,dpr);

  const months = Array.from({length:12},(_,i)=>{
    const r = yd.find(d=>d.month===i+1);
    return { sg:r?+r.salaryGross:0, sn:r?+r.salaryNet:0, bg:r?+r.bonusGross:0, bn:r?+r.bonusNet:0, has:!!r };
  });
  const maxV = Math.max(...months.map(m=>m.sg+m.bg), 1);
  const PL=6,PR=6,PT=18,PB=26,cW=W-PL-PR,cH=H-PT-PB;
  const gW=cW/12, bW=Math.min(gW*0.28,11);
  ctx.clearRect(0,0,W,H);

  ctx.strokeStyle='#e2ddd6'; ctx.lineWidth=0.8;
  for(let i=0;i<=4;i++){const y=PT+cH*(1-i/4);ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();}
  ctx.fillStyle='#9ca3af'; ctx.font=`9px "DM Mono"`; ctx.textAlign='right';
  ctx.fillText('¥'+fmtM(maxV), W-PR, PT-4);

  months.forEach((m,i)=>{
    const cx = PL+gW*i+gW/2;
    const drawBar=(v,color,ox,r2)=>{
      if(!v)return;
      const bh=(v/maxV)*cH,x=cx-bW*1.5+ox,y=PT+cH-bh,r=2;
      ctx.shadowColor=color+'44'; ctx.shadowBlur=4; ctx.fillStyle=color;
      ctx.beginPath();
      ctx.moveTo(x+r,y);ctx.lineTo(x+bW-r,y);ctx.quadraticCurveTo(x+bW,y,x+bW,y+r);
      ctx.lineTo(x+bW,y+bh);ctx.lineTo(x,y+bh);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();ctx.fill();ctx.shadowBlur=0;
    };
    drawBar(m.sg,'#1d4ed8',0);
    drawBar(m.sn,'#059669',bW+1);
    if(m.bg) drawBar(m.bg,'#b45309',bW*2+2);
    ctx.fillStyle=m.has?'#374151':'#d1d5db';
    ctx.font=`9px "Noto Sans JP"`; ctx.textAlign='center';
    ctx.fillText((i+1)+'月',cx,H-7);
  });

  const tip = document.getElementById('tip-m');
  const onTap = e => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const clientX = e.changedTouches ? e.changedTouches[0].clientX
                  : e.touches        ? e.touches[0].clientX
                  : e.clientX;
    const cx = clientX - rect.left;
    const col = Math.floor((cx - PL) / gW);
    if (col < 0 || col > 11 || !months[col].has) { tip.classList.remove('vis'); return; }
    const m = months[col];
    let html = `<b>${yr}年${col+1}月</b><br>💴 額面 ¥${N(m.sg)}<br>💴 手取 ¥${N(m.sn)}`;
    if (m.bg) html += `<br>🎁 賞与額面 ¥${N(m.bg)}<br>🎁 賞与手取 ¥${N(m.bn)}`;
    tip.innerHTML = html;
    const tipW = 155;
    const left = Math.min(Math.max(cx - tipW/2, 4), W - tipW - 4);
    tip.style.left = left + 'px';
    tip.style.top = (PT + 4) + 'px';
    tip.classList.add('vis');
  };
  cvs.addEventListener('touchend', onTap, { passive: false });
  cvs.addEventListener('click', onTap);
  // グラフ以外をタップしたら消える
  const hideTip = e => { if (e.target !== cvs) tip.classList.remove('vis'); };
  document.addEventListener('touchend', hideTip, { passive: true });
  document.addEventListener('click', hideTip);
}

function renderCmp() {
  const el = document.getElementById('cmp-list');
  const yrs = getYears();
  if(!yrs.length){el.innerHTML='<div class="empty-state" style="padding:20px"><p>データなし</p></div>';return;}
  const ann = yrs.map(y=>{
    const d=S.allData.filter(s=>s.year===y);
    const tg=d.reduce((a,s)=>a+(+s.salaryGross||0)+(+s.bonusGross||0),0);
    const tn=d.reduce((a,s)=>a+(+s.salaryNet||0)+(+s.bonusNet||0),0);
    return{year:y,tg,tn,mo:d.length};
  });
  const maxG=Math.max(...ann.map(a=>a.tg),1);
  el.innerHTML=ann.map((a,i)=>{
    const prev=ann[i+1]; const delta=prev&&prev.tg?((a.tg-prev.tg)/prev.tg*100).toFixed(1):null;
    const cls=delta===null?'flat':(+delta>=0?'up':'down');
    const ds=delta===null?'初年度':(+delta>=0?`+${delta}%`:`${delta}%`);
    return`<div class="cmp-row">
      <div class="cmp-yr">${a.year}</div>
      <div class="cmp-bars">
        <div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="background:var(--gross);width:${(a.tg/maxG*100).toFixed(1)}%"></div></div><div class="bar-amt" style="color:var(--gross)">¥${fmtM(a.tg)}</div></div>
        <div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="background:var(--net);width:${(a.tn/maxG*100).toFixed(1)}%"></div></div><div class="bar-amt" style="color:var(--net)">¥${fmtM(a.tn)}</div></div>
      </div>
      <div class="cmp-right"><span class="delta ${cls}">${ds}</span><span class="cmp-mo">${a.mo}ヶ月</span></div>
    </div>`;
  }).join('');
}

function renderYearlyLine() {
  const cvs=document.getElementById('c-yearly');
  const dpr=window.devicePixelRatio||1, W=cvs.parentElement.clientWidth||300, H=160;
  cvs.width=W*dpr;cvs.height=H*dpr;cvs.style.width=W+'px';cvs.style.height=H+'px';
  const ctx=cvs.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const yrs=getYears().slice().reverse();
  if(yrs.length<2){ctx.fillStyle='#9ca3af';ctx.font='13px "Noto Sans JP"';ctx.textAlign='center';ctx.fillText('2年以上のデータが揃うと表示されます',W/2,H/2);return;}
  const ann=yrs.map(y=>{const d=S.allData.filter(s=>s.year===y);return{g:d.reduce((a,s)=>a+(+s.salaryGross||0)+(+s.bonusGross||0),0),n:d.reduce((a,s)=>a+(+s.salaryNet||0)+(+s.bonusNet||0),0)};});
  const maxV=Math.max(...ann.map(a=>a.g),1);
  const PL=12,PR=12,PT=14,PB=26,cW=W-PL-PR,cH=H-PT-PB;
  ctx.strokeStyle='#e2ddd6';ctx.lineWidth=0.8;
  for(let i=0;i<=4;i++){const y=PT+cH*i/4;ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();}
  const drawLine=(vals,color)=>{
    const pts=vals.map((v,i)=>({x:PL+cW*i/(yrs.length-1),y:PT+cH-(v/maxV)*cH}));
    const grad=ctx.createLinearGradient(0,PT,0,PT+cH);grad.addColorStop(0,color+'40');grad.addColorStop(1,color+'00');
    ctx.beginPath();ctx.moveTo(pts[0].x,PT+cH);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,PT+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();});
    ctx.fillStyle=color;ctx.font='9px "DM Mono"';ctx.textAlign='center';
    pts.forEach((p,i)=>ctx.fillText('¥'+fmtM(vals[i]),p.x,p.y-7));
  };
  drawLine(ann.map(a=>a.g),'#1d4ed8');
  drawLine(ann.map(a=>a.n),'#059669');
  ctx.fillStyle='#6b7280';ctx.font='9px "Noto Sans JP"';ctx.textAlign='center';
  yrs.forEach((y,i)=>ctx.fillText(y+'年',PL+cW*i/(yrs.length-1),H-8));
}

// ════════════════════════════════════════
//  設定
// ════════════════════════════════════════
function renderConfig() {
  const fields = S.config.fields || [];
  const html = `<div class="config-page">
    <div class="card" style="margin-bottom:12px">
      <div class="card-hdr"><h2>🔗 GAS Web App URL</h2></div>
      <div class="card-body">
        <div class="field-group">
          <label class="field-label">デプロイURL</label>
          <input type="url" class="field-input" id="gas-url-inp" value="${GAS_URL===GAS_INIT?'':GAS_URL}" placeholder="https://script.google.com/macros/s/..." style="font-size:13px">
        </div>
        <button class="btn-primary" onclick="saveGasUrl()" style="margin:0">URLを保存</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="card-hdr">
        <h2>📝 詳細入力の項目管理</h2>
        <button class="btn-secondary" style="font-size:12px;padding:6px 12px" onclick="openAddModal()">＋ 追加</button>
      </div>
      <div id="cfg-fields-list">
        ${fields.length === 0
          ? '<div class="empty-state" style="padding:20px"><p>項目がありません</p></div>'
          : fields.map((f,i) => `
            <div class="cfg-row" draggable="true" data-idx="${i}"
              ondragstart="onDragStart(event,${i})"
              ondragover="onDragOver(event)"
              ondragleave="onDragLeave(event)"
              ondrop="onDrop(event,${i})"
              ondragend="onDragEnd(event)"
              ontouchstart="onTouchStart(event,${i})"
              ontouchmove="onTouchMove(event)" style="touch-action:none"
              ontouchend="onTouchEnd(event,${i})">
              <span class="drag-handle">⠿</span>
              <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px">
                <input type="text" value="${eh(f.label)}"
                  style="font-size:14px;font-weight:500;border:none;background:transparent;padding:0;width:100%;font-family:inherit;color:var(--ink);border-bottom:1px dashed transparent;"
                  onfocus="this.style.borderBottomColor='var(--accent)';this.style.background='#f8f8f8'"
                  onblur="this.style.borderBottomColor='transparent';this.style.background='transparent';updateFieldLabel(${i},this.value)"
                  onchange="updateFieldLabel(${i},this.value)">
                <div style="display:flex;gap:4px">
                  <button onclick="toggleFieldCategory(${i})" style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;border:none;cursor:pointer;${f.category==='income'?'background:#f0fdf4;color:#166534':'background:#fff1f2;color:#9f1239'}">${f.category==='income'?'支給':'控除'}</button>
                </div>
              </div>
              <button class="btn-danger2" onclick="removeCfgField(${i})">削除</button>
            </div>`).join('')}
      </div>
      <div style="padding:12px 16px">
        <button class="btn-primary" onclick="saveCfg()" style="margin:0">項目設定を保存</button>
      </div>
    </div>
  </div>`;
  setContent(html);
}

// ── 項目並び替え（PC: ドラッグ＆ドロップ、iPhone: タッチ）──
let dragSrcIdx = null;
let touchSrcIdx = null;
let touchClone = null;

// PC用
function onDragStart(e, idx) {
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.cfg-row').forEach(r => r.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  const fields = S.config.fields;
  const moved = fields.splice(dragSrcIdx, 1)[0];
  fields.splice(idx, 0, moved);
  renderConfig();
  toast('↕ 並び順を変更しました');
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.cfg-row').forEach(r => r.classList.remove('drag-over'));
  dragSrcIdx = null;
}

// iPhone用タッチ並び替え
function onTouchStart(e, idx) {
  touchSrcIdx = idx;
  const row = e.currentTarget;
  const rect = row.getBoundingClientRect();
  touchClone = row.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:999;pointer-events:none;background:white;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.2);`;
  document.body.appendChild(touchClone);
  row.classList.add('dragging');
}
function onTouchMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  if (touchClone) {
    touchClone.style.top = (touch.clientY - 30) + 'px';
    touchClone.style.left = (touch.clientX - 150) + 'px';
  }
  // どの行の上にいるか判定
  document.querySelectorAll('.cfg-row').forEach(r => r.classList.remove('drag-over'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const row = el ? el.closest('.cfg-row') : null;
  if (row) row.classList.add('drag-over');
}
function onTouchEnd(e, srcIdx) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.cfg-row').forEach(r => {
    r.classList.remove('dragging');
    r.classList.remove('drag-over');
  });
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const targetRow = el ? el.closest('.cfg-row') : null;
  if (!targetRow) { touchSrcIdx = null; return; }
  const targetIdx = +targetRow.dataset.idx;
  if (isNaN(targetIdx) || targetIdx === srcIdx) { touchSrcIdx = null; return; }
  const fields = S.config.fields;
  const moved = fields.splice(srcIdx, 1)[0];
  fields.splice(targetIdx, 0, moved);
  touchSrcIdx = null;
  renderConfig();
  toast('↕ 並び順を変更しました');
}

function updateFieldLabel(i, val) {
  if (S.config.fields[i]) S.config.fields[i].label = val.trim() || S.config.fields[i].label;
}
function toggleFieldCategory(i) {
  if (!S.config.fields[i]) return;
  S.config.fields[i].category = S.config.fields[i].category === 'income' ? 'deduction' : 'income';
  renderConfig();
}

function removeCfgField(i) {
  S.config.fields.splice(i, 1);
  renderConfig();
}

async function saveCfg() {
  try {
    await api({ action:'saveConfig', config: S.config });
    toast('✅ 項目設定を保存しました');
  } catch(e) { toast('❌ 保存に失敗しました'); }
}

function saveGasUrl() {
  const u = document.getElementById('gas-url-inp').value.trim();
  if (!u.startsWith('https://script.google.com')) { toast('❌ 正しいGAS URLを入力してください'); return; }
  GAS_URL = u; localStorage.setItem('gas_url', u);
  toast('✅ URLを保存しました');
  loadAll().then(() => renderYears()).then(() => switchTab('years'));
}

// ── Modal ──────────────────────────────────────────────────
function openAddModal(){document.getElementById('new-field-label').value='';document.getElementById('new-field-category').value='income';document.getElementById('add-modal').classList.add('open');setTimeout(()=>document.getElementById('new-field-label').focus(),300);}
function closeAddModal(e){if(!e||e.target===document.getElementById('add-modal'))document.getElementById('add-modal').classList.remove('open');}
function addField(){
  const label = document.getElementById('new-field-label').value.trim();
  const category = document.getElementById('new-field-category').value;
  if(!label){ toast('❌ 項目名を入力してください'); return; }
  if(!S.config.fields) S.config.fields = [];
  S.config.fields.push({ key: 'c_'+Date.now(), label, category });
  closeAddModal();
  renderConfig();
  toast('✅ 項目を追加しました');
}

// ── Utils ──────────────────────────────────────────────────
function setContent(html) {
  const el = document.getElementById('content');
  el.innerHTML = html;
  // iOS Safari対応: 複数の方法でスクロールをトップに戻す
  el.scrollTop = 0;
  window.scrollTo(0, 0);
  setTimeout(() => { el.scrollTop = 0; window.scrollTo(0, 0); }, 50);
}
function updateHdr(title, btns=[]) {
  document.querySelector('.hdr-left h1').textContent = title;
  document.getElementById('hdr-actions').innerHTML = btns.join('');
}
function N(n){ return Number(n||0).toLocaleString(); }
function fmtM(n){ const v=n/10000; return v>=10000?(v/10000).toFixed(1)+'億':(v).toFixed(1)+'万'; }
function eh(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let _tt;
function toast(msg){ const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500); }
</script>
